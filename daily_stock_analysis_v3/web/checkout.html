<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - DSA</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        .order-summary {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .summary-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.2rem;
            color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        #card-element {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
        }
        .btn-pay {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-pay:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        .secure-badge svg {
            width: 20px;
            height: 20px;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message {
            background: #efe;
            color: #060;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .plan-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Secure Checkout</h1>
            <p>Complete your subscription upgrade</p>
        </div>

        <div class="card">
            <h2>Order Summary</h2>
            <div class="order-summary">
                <div class="plan-badge" id="plan-name">Basic Plan</div>
                <div class="summary-row">
                    <span>Subscription</span>
                    <span id="plan-price">$29.00</span>
                </div>
                <div class="summary-row">
                    <span>Billing Period</span>
                    <span id="billing-period">Monthly</span>
                </div>
                <div class="summary-row">
                    <span>Tax</span>
                    <span id="tax-amount">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Total Due Today</span>
                    <span id="total-amount">$29.00</span>
                </div>
            </div>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <form id="payment-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="name">Cardholder Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label>Card Information</label>
                    <div id="card-element"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="zip">ZIP/Postal Code</label>
                        <input type="text" id="zip" required placeholder="12345">
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" required placeholder="US">
                    </div>
                </div>

                <button type="submit" class="btn-pay" id="submit-button">
                    <span id="button-text">Subscribe Now</span>
                </button>

                <div class="secure-badge">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <span>Payments are secure and encrypted</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Get plan from URL
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'basic';
        
        // Plan pricing
        const plans = {
            'basic': { name: 'Basic Plan', price: 29, period: 'Monthly' },
            'pro': { name: 'Pro Plan', price: 99, period: 'Monthly' },
            'enterprise': { name: 'Enterprise Plan', price: 499, period: 'Monthly' },
        };

        // Update summary
        const selectedPlan = plans[plan] || plans.basic;
        document.getElementById('plan-name').textContent = selectedPlan.name;
        document.getElementById('plan-price').textContent = `$${selectedPlan.price}.00`;
        document.getElementById('billing-period').textContent = selectedPlan.period;
        document.getElementById('total-amount').textContent = `$${selectedPlan.price}.00`;

        // Initialize Stripe
        const stripe = Stripe('pk_test_YOUR_STRIPE_PUBLISHABLE_KEY'); // Replace with your key
        const elements = stripe.elements();
        
        const cardElement = elements.create('card', {
            style: {
                base: {
                    fontSize: '16px',
                    color: '#32325d',
                    '::placeholder': { color: '#aab7c4' },
                },
            },
        });
        
        cardElement.mount('#card-element');

        // Handle form submission
        const form = document.getElementById('payment-form');
        const submitButton = document.getElementById('submit-button');
        const buttonText = document.getElementById('button-text');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            // Disable button
            submitButton.disabled = true;
            buttonText.textContent = 'Processing...';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                // Get API key from storage or URL
                const apiKey = localStorage.getItem('api_key') || urlParams.get('api_key');
                
                if (!apiKey) {
                    throw new Error('API key not found. Please login first.');
                }

                // Create payment intent
                const intentResponse = await fetch('/api/saas/payment-intent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey,
                    },
                    body: JSON.stringify({
                        plan: plan,
                        amount: selectedPlan.price,
                    }),
                });

                const intentData = await intentResponse.json();

                if (!intentData.success) {
                    throw new Error(intentData.error || 'Failed to create payment intent');
                }

                // Confirm payment with Stripe
                const result = await stripe.confirmCardPayment(intentData.client_secret, {
                    payment_method: {
                        card: cardElement,
                        billing_details: {
                            name: document.getElementById('name').value,
                            email: document.getElementById('email').value,
                            address: {
                                postal_code: document.getElementById('zip').value,
                                country: document.getElementById('country').value,
                            },
                        },
                    },
                });

                if (result.error) {
                    throw new Error(result.error.message);
                }

                // Payment successful
                if (result.paymentIntent.status === 'succeeded') {
                    // Activate subscription
                    const activateResponse = await fetch('/api/saas/activate-subscription', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': apiKey,
                        },
                        body: JSON.stringify({
                            plan: plan,
                            payment_intent_id: result.paymentIntent.id,
                        }),
                    });

                    const activateData = await activateResponse.json();

                    if (activateData.success) {
                        successMessage.textContent = '🎉 Payment successful! Your subscription is now active.';
                        successMessage.style.display = 'block';
                        
                        // Redirect after 3 seconds
                        setTimeout(() => {
                            window.location.href = '/admin?subscription=active';
                        }, 3000);
                    } else {
                        throw new Error(activateData.error || 'Failed to activate subscription');
                    }
                }

            } catch (error) {
                console.error('Payment error:', error);
                errorMessage.textContent = 'Error: ' + error.message;
                errorMessage.style.display = 'block';
                
                // Re-enable button
                submitButton.disabled = false;
                buttonText.textContent = 'Subscribe Now';
            }
        });

        // Real-time validation
        cardElement.on('change', (event) => {
            if (event.error) {
                errorMessage.textContent = event.error.message;
                errorMessage.style.display = 'block';
            } else {
                errorMessage.style.display = 'none';
            }
        });
    </script>
</body>
</html>
