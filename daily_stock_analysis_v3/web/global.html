<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Markets</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4aa;
            --primary-dark: #00b894;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-input: #21262d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header span {
            color: var(--primary);
        }

        .nav-links {
            margin-left: auto;
            display: flex;
            gap: 16px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        /* Main */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .page-title {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        /* Sections */
        .section {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Indices Grid */
        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .index-card {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .index-card:hover {
            border-color: var(--primary);
        }

        .index-name {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .index-price {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .index-change {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .index-change.positive {
            color: var(--success);
        }

        .index-change.negative {
            color: var(--danger);
        }

        /* Forex */
        .forex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .forex-card {
            background: var(--bg-input);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .forex-pair {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .forex-rate {
            font-size: 20px;
            font-weight: 700;
        }

        .forex-change {
            font-size: 12px;
            margin-top: 4px;
        }

        /* Commodities */
        .commodities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .commodity-card {
            background: var(--bg-input);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .commodity-name {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .commodity-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--warning);
        }

        /* Charts */
        .chart-container {
            height: 300px;
            margin-top: 16px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Last Updated */
        .last-updated {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 24px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .indices-grid,
            .forex-grid,
            .commodities-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🌍 Global <span>Markets</span></h1>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/analyze">Analyze</a>
            <a href="/charts">Charts</a>
            <a href="/portfolio">Portfolio</a>
            <a href="/crypto">Crypto</a>
            <a href="/agent">Agent</a>
        </nav>
    </header>

    <main class="main">
        <h1 class="page-title">🌍 Global Markets</h1>
        <p class="page-subtitle">Live world indices, forex rates, and commodities</p>

        <!-- World Indices -->
        <div class="section">
            <h2 class="section-title">📈 World Indices</h2>
            <div class="indices-grid" id="indices">
                <div class="loading"><div class="spinner"></div>Loading...</div>
            </div>
        </div>

        <!-- Forex -->
        <div class="section">
            <h2 class="section-title">💱 Forex Rates</h2>
            <div class="forex-grid" id="forex">
                <div class="loading"><div class="spinner"></div>Loading...</div>
            </div>
        </div>

        <!-- Commodities -->
        <div class="section">
            <h2 class="section-title">🪙 Commodities</h2>
            <div class="commodities-grid" id="commodities">
                <div class="loading"><div class="spinner"></div>Loading...</div>
            </div>
        </div>

        <!-- S&P 500 Chart -->
        <div class="section">
            <h2 class="section-title">📊 S&P 500 - 1 Month</h2>
            <div class="chart-container">
                <canvas id="spChart"></canvas>
            </div>
        </div>

        <p class="last-updated">Last updated: <span id="lastUpdated">-</span></p>
    </main>

    <script>
        const API_BASE = '';

        async function loadIndices() {
            try {
                const res = await fetch(API_BASE + '/api/global/indices');
                const data = await res.json();
                
                const container = document.getElementById('indices');
                container.innerHTML = data.indices.map(idx => {
                    const change = idx.change || 0;
                    const isPositive = change >= 0;
                    return `
                        <div class="index-card">
                            <div class="index-name">${idx.name}</div>
                            <div class="index-price">${idx.price.toLocaleString()}</div>
                            <div class="index-change ${isPositive ? 'positive' : 'negative'}">
                                ${isPositive ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('indices').innerHTML = '<p>Error loading indices</p>';
            }
        }

        async function loadForex() {
            try {
                const res = await fetch(API_BASE + '/api/global/forex');
                const data = await res.json();
                
                const container = document.getElementById('forex');
                container.innerHTML = data.rates.map(fx => {
                    const change = fx.change || 0;
                    const isPositive = change >= 0;
                    return `
                        <div class="forex-card">
                            <div class="forex-pair">${fx.pair}</div>
                            <div class="forex-rate">${fx.rate.toFixed(4)}</div>
                            <div class="forex-change ${isPositive ? 'positive' : 'negative'}" style="color: ${isPositive ? 'var(--success)' : 'var(--danger)'}">
                                ${isPositive ? '+' : ''}${change.toFixed(2)}%
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('forex').innerHTML = '<p>Error loading forex</p>';
            }
        }

        async function loadCommodities() {
            try {
                const res = await fetch(API_BASE + '/api/global/commodities');
                const data = await res.json();
                
                const container = document.getElementById('commodities');
                container.innerHTML = data.commodities.map(cmd => {
                    return `
                        <div class="commodity-card">
                            <div class="commodity-name">${cmd.name}</div>
                            <div class="commodity-price">$${cmd.price.toFixed(2)}</div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('commodities').innerHTML = '<p>Error loading commodities</p>';
            }
        }

        async function loadChart() {
            try {
                const res = await fetch(API_BASE + '/api/chart/^GSPC?range=1mo&interval=1d');
                const data = await res.json();
                
                const ctx = document.getElementById('spChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.dates || [],
                        datasets: [{
                            label: 'S&P 500',
                            data: data.prices || [],
                            borderColor: '#00d4aa',
                            backgroundColor: 'rgba(0, 212, 170, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: '#30363d' },
                                ticks: { color: '#8b949e' }
                            },
                            y: {
                                grid: { color: '#30363d' },
                                ticks: { color: '#8b949e' }
                            }
                        }
                    }
                });
            } catch (e) {
                console.error('Chart error:', e);
            }
        }

        // Load all data
        loadIndices();
        loadForex();
        loadCommodities();
        loadChart();

        // Update timestamp
        document.getElementById('lastUpdated').textContent = new Date().toLocaleString();

        // Auto refresh every 60 seconds
        setInterval(() => {
            loadIndices();
            loadForex();
            loadCommodities();
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
        }, 60000);
    </script>
</body>
</html>
